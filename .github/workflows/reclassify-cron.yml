name: Reclassify tokens (cron)

on:
  schedule:
    - cron: "0 */12 * * *"   # every 12 hours (UTC)
  workflow_dispatch:
    inputs:
      force:
        description: "Cooldown bypass (1 = yes)"
        required: false
        default: "0"

concurrency:
  group: reclassify-cron
  cancel-in-progress: false

jobs:
  call-cron-endpoint:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Resolve envs
        id: prep
        env:
          CRON_URL_SECRET: ${{ secrets.CRON_URL }}
          CRON_URL_VAR:    ${{ vars.CRON_URL }}
          CRON_SECRET_S:   ${{ secrets.CRON_SECRET }}
          CRON_SECRET_V:   ${{ vars.CRON_SECRET }}

          CRON_ENABLED_URL_SECRET: ${{ secrets.CRON_ENABLED_URL }}
          CRON_ENABLED_URL_VAR:    ${{ vars.CRON_ENABLED_URL }}
        run: |
          set -euo pipefail

          CRON_URL="${CRON_URL_SECRET:-${CRON_URL_VAR:-}}"
          CRON_SECRET="${CRON_SECRET_S:-${CRON_SECRET_V:-}}"
          CRON_ENABLED_URL="${CRON_ENABLED_URL_SECRET:-${CRON_ENABLED_URL_VAR:-}}"

          if [ -z "${CRON_URL:-}" ]; then echo "CRON_URL missing"; exit 1; fi
          if [ -z "${CRON_SECRET:-}" ]; then echo "CRON_SECRET missing"; exit 1; fi
          if [ -z "${CRON_ENABLED_URL:-}" ]; then echo "CRON_ENABLED_URL missing"; exit 1; fi

          echo "cron_url=$CRON_URL" >> "$GITHUB_OUTPUT"
          echo "cron_enabled_url=$CRON_ENABLED_URL" >> "$GITHUB_OUTPUT"

      - name: Precheck cron_enabled
        if: ${{ github.event_name == 'schedule' }}
        env:
          CRON_ENABLED_URL: ${{ steps.prep.outputs.cron_enabled_url }}
        run: |
          set -euo pipefail

          BODY=$(curl -sS -L --retry 3 --retry-delay 3 "$CRON_ENABLED_URL?v=$(date +%s)")
          echo "cron_enabled response: $BODY"

          ENABLED=$(echo "$BODY" | jq -r '.value // empty')

          if [ -z "$ENABLED" ]; then
            echo "❌ cron_enabled invalid response"
            exit 1
          fi

          ENABLED=$(echo "$ENABLED" | tr '[:upper:]' '[:lower:]')

          if [ "$ENABLED" != "true" ] && [ "$ENABLED" != "1" ] && [ "$ENABLED" != "yes" ] && [ "$ENABLED" != "on" ]; then
            echo "Cron disabled — skipping"
            exit 0
          fi

      - name: POST (trigger endpoint)
        env:
          CRON_URL: ${{ steps.prep.outputs.cron_url }}
          CRON_SECRET_S: ${{ secrets.CRON_SECRET }}
          CRON_SECRET_V: ${{ vars.CRON_SECRET }}
        run: |
          set -euo pipefail

          CRON_SECRET="${CRON_SECRET_S:-${CRON_SECRET_V:-}}"
          URL="$CRON_URL?v=$(date +%s)"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.force }}" = "1" ]; then
            URL="${URL}&force=1"
          fi

          echo "Calling: $URL"
          echo "Time: $(date)"

          STATUS=$(curl -sS -L -X POST "$URL" \
            -H "X-CRON-SECRET: $CRON_SECRET" \
            --retry 3 --retry-delay 3 \
            -o /tmp/body.json -w "%{http_code}")

          echo "HTTP $STATUS"
          cat /tmp/body.json || true

          if [ ! -s /tmp/body.json ]; then
            echo "❌ Empty response"
            exit 1
          fi

          OK=$(jq -r '.ok // empty' /tmp/body.json)
          STAGE=$(jq -r '.stage // empty' /tmp/body.json)
          PROCESSED=$(jq -r '.processed // 0' /tmp/body.json)

          if [ "$STATUS" -ge 400 ]; then
            echo "❌ HTTP error"
            exit 1
          fi

          if [ "$OK" != "true" ]; then
            echo "❌ ok != true"
            exit 1
          fi

          if [ "$STAGE" != "after_reclassify" ]; then
            echo "❌ invalid stage: $STAGE"
            exit 1
          fi

          echo "✅ Success — processed: $PROCESSED"
